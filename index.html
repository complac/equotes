<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>equotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-wrap">
        <video class="bg-video" autoplay muted loop playsinline>
            <source src="gargantua-black-web.mp4" type="video/mp4">
        </video>
        <div class="bg-overlay"></div>
    </div>

    <header class="header">
        <span class="logo">equotes</span>
        <nav class="nav">
            <button class="tab active" data-tab="quotes">quotes</button>
            <button class="tab" data-tab="poems">poems</button>
        </nav>
    </header>

    <main class="main">
        <div class="stage">
            <blockquote id="text" class="quote-text"></blockquote>
            <cite id="author" class="quote-author"></cite>
        </div>
        <button id="new-btn" class="next-btn">generate</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
