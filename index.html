<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>equotes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <span class="logo">equotes</span>
        <nav class="nav">
            <button class="tab active" data-tab="quotes">quotes</button>
            <button class="tab" data-tab="poems">poems</button>
        </nav>
    </header>

    <main class="main">
        <div class="stage">
            <blockquote id="text" class="quote-text"></blockquote>
            <cite id="author" class="quote-author"></cite>
        </div>
        <button id="new-btn" class="next-btn">generate</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
